<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 聽寫特訓營 - 隨機強化版</title>
    <style>
        :root { 
            --primary: #4f46e5; 
            --success: #10b981; 
            --danger: #ef4444; 
            --bg: #eff6ff; 
            --card-bg: rgba(255, 255, 255, 0.95);
        }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; 
        }
        .card { 
            background: var(--card-bg); width: 95%; max-width: 500px; padding: 2.5rem; 
            border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            backdrop-filter: blur(10px);
        }
        h2 { text-align: center; color: #1e293b; margin-bottom: 1.5rem; font-weight: 800; letter-spacing: -0.025em; }
        
        /* 輸入區域 */
        textarea { 
            width: 100%; height: 100px; border: 2px solid #e2e8f0; border-radius: 16px; 
            padding: 1rem; font-size: 1rem; margin-bottom: 1rem; box-sizing: border-box;
            transition: all 0.3s;
        }
        textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        
        /* 下拉選單 */
        .setting-label { font-size: 0.85rem; color: #64748b; margin-bottom: 0.5rem; display: block; font-weight: 600; }
        select { 
            width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0; 
            background: white; cursor: pointer; margin-bottom: 1.5rem;
        }

        /* 按鈕設計 */
        button { 
            cursor: pointer; border: none; border-radius: 12px; padding: 14px 24px; 
            font-weight: 700; font-size: 1rem; transition: all 0.2s; width: 100%; 
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
        .btn-audio { background: #f1f5f9; color: var(--primary); width: auto; margin: 0 auto 1.5rem; display: block; border: 1px solid #e2e8f0; }

        /* 練習區域 */
        #practice-area, #report-area { display: none; }
        .progress-container { margin: 1.5rem 0; }
        .progress-bar { height: 10px; background: #e2e8f0; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .input-box { 
            width: 100%; font-size: 1.75rem; padding: 15px; border: 3px solid #e2e8f0; 
            border-radius: 16px; text-align: center; box-sizing: border-box; margin: 15px 0;
            font-weight: 600; color: #1e293b;
        }
        .input-error { border-color: var(--danger); background: #fff1f2; animation: shake 0.4s; }
        
        /* 視覺反饋 */
        .feedback { padding: 1.25rem; border-radius: 16px; margin: 1.25rem 0; font-weight: 700; text-align: center; line-height: 1.6; }
        .correct { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .wrong { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .correct-ans-text { font-size: 2rem; display: block; margin: 5px 0; color: var(--danger); letter-spacing: 3px; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; border-radius: 12px; overflow: hidden; }
        th, td { padding: 14px; text-align: left; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="card">
    <div id="setup-area">
        <h2>🎯 聽寫特訓營</h2>
        <label class="setting-label">1. 選擇清晰人聲</label>
        <select id="voiceSelect"></select>

        <label class="setting-label">2. 輸入生字清單 (空格或逗號隔開)</label>
        <textarea id="wordInput" placeholder="例如: environment, artificial, schedule..."></textarea>
        
        <button class="btn-primary" onclick="initPractice()">開始隨機練習</button>
    </div>

    <div id="practice-area">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
            <b id="roundTitle" style="color: var(--primary); font-size: 1.1rem;">第一輪</b>
            <span style="color: #64748b; font-weight: 600;"><span id="currIdx">1</span> / <span id="totalIdx">0</span></span>
        </div>
        <div class="progress-container">
            <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
        </div>
        
        <button class="btn-audio" onclick="speak()">🔊 播放發音</button>
        
        <input type="text" id="userInput" class="input-box" placeholder="輸入單字..." autocomplete="off" spellcheck="false">
        
        <div id="feedback"></div>
        <button id="mainBtn" class="btn-primary" onclick="processInput()">提交答案 (Enter)</button>
    </div>

    <div id="report-area">
        <h2>📊 練習報告</h2>
        <div id="scoreBox" style="text-align:center; margin-bottom:20px; font-size: 1.1rem;"></div>
        <table id="reportTable"><tbody></tbody></table>
        <div id="reportAction" style="margin-top:25px;"></div>
    </div>
</div>

<script>
    let allWords = [], currentPool = [], currentIndex = 0;
    let wrongThisRound = new Set(), currentRound = 1;
    let isCorrectionMode = false, correctionDone = 0, isWaitingNext = false;
    const synth = window.speechSynthesis;
    let voices = [];

    function loadVoices() {
        voices = synth.getVoices();
        const select = document.getElementById('voiceSelect');
        const currentSelection = select.value;
        select.innerHTML = '';
        const enVoices = voices.filter(v => v.lang.includes('en'));
        enVoices.forEach(v => {
            const option = document.createElement('option');
            option.value = v.name;
            option.innerText = `${v.name} (${v.lang.includes('US') ? '美音' : '英音'})`;
            if (v.name === currentSelection) option.selected = true;
            select.appendChild(option);
        });
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    // 隨機洗牌演算法
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initPractice() {
        const text = document.getElementById('wordInput').value;
        allWords = [...new Set(text.split(/[\s,，\n]+/).filter(w => w.trim() !== ""))];
        if (allWords.length === 0) return alert("請先輸入單字！");
        
        currentPool = shuffle([...allWords]); // 第一輪就隨機
        wrongThisRound.clear();
        currentRound = 1;
        startRound();
    }

    function startRound() {
        currentIndex = 0;
        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('report-area').style.display = 'none';
        document.getElementById('practice-area').style.display = 'block';
        document.getElementById('roundTitle').innerText = `第 ${currentRound} 輪挑戰`;
        resetQuestion();
    }

    function resetQuestion() {
        isCorrectionMode = false;
        isWaitingNext = false;
        correctionDone = 0;
        document.getElementById('totalIdx').innerText = currentPool.length;
        document.getElementById('currIdx').innerText = currentIndex + 1;
        document.getElementById('progressBar').style.width = `${(currentIndex / currentPool.length) * 100}%`;
        
        const input = document.getElementById('userInput');
        input.value = "";
        input.disabled = false;
        input.className = "input-box";
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('mainBtn').innerText = "提交答案 (Enter)";
        input.focus();
        speak();
    }

    function speak() {
        if (synth.speaking) synth.cancel();
        const utter = new SpeechSynthesisUtterance(currentPool[currentIndex]);
        const voiceName = document.getElementById('voiceSelect').value;
        utter.voice = voices.find(v => v.name === voiceName) || null;
        utter.rate = 0.75;
        synth.speak(utter);
    }

    function processInput() {
        const inputField = document.getElementById('userInput');
        const feedback = document.getElementById('feedback');
        const userVal = inputField.value.trim().toLowerCase();
        const correctVal = currentPool[currentIndex].toLowerCase();

        if (isWaitingNext) {
            currentIndex++;
            if (currentIndex < currentPool.length) resetQuestion();
            else showReport();
            return;
        }

        if (isCorrectionMode) {
            if (userVal === correctVal) {
                correctionDone++;
                if (correctionDone >= 2) {
                    feedback.className = "feedback correct";
                    feedback.innerHTML = "✨ 記住了！按 Enter 進入下一題";
                    isWaitingNext = true;
                    document.getElementById('mainBtn').innerText = "繼續 ➔";
                } else {
                    feedback.innerHTML = `請再拼寫一次以確認記憶 (1/2):<br><b class="correct-ans-text">${currentPool[currentIndex]}</b>`;
                    inputField.value = "";
                }
            } else {
                correctionDone = 0;
                feedback.innerHTML = `拼錯了，請重新連續輸入兩次:<br><b class="correct-ans-text">${currentPool[currentIndex]}</b>`;
                inputField.value = "";
            }
            return;
        }

        if (userVal === correctVal) {
            feedback.style.display = 'block';
            feedback.className = "feedback correct";
            feedback.innerHTML = "✅ 非常完美！按 Enter 繼續";
            isWaitingNext = true;
            document.getElementById('mainBtn').innerText = "繼續 ➔";
        } else {
            isCorrectionMode = true;
            wrongThisRound.add(currentPool[currentIndex]);
            feedback.style.display = 'block';
            feedback.className = "feedback wrong";
            feedback.innerHTML = `❌ 拼錯了！正確答案是：<br><b class="correct-ans-text">${currentPool[currentIndex]}</b><br>請輸入兩次以繼續 (0/2)`;
            inputField.value = "";
            inputField.className = "input-box input-error";
            speak();
        }
    }

    function showReport() {
        document.getElementById('practice-area').style.display = 'none';
        document.getElementById('report-area').style.display = 'block';
        const tbody = document.querySelector('#reportTable tbody');
        tbody.innerHTML = "";
        
        currentPool.forEach(word => {
            const row = tbody.insertRow();
            row.insertCell(0).innerHTML = `<b>${word}</b>`;
            const status = row.insertCell(1);
            status.innerText = wrongThisRound.has(word) ? "❌ 需加強" : "✅ 掌握";
            status.style.color = wrongThisRound.has(word) ? "var(--danger)" : "var(--success)";
            status.style.fontWeight = "bold";
        });

        const rate = Math.round(((currentPool.length - wrongThisRound.size)/currentPool.length)*100);
        document.getElementById('scoreBox').innerHTML = `本輪準確率：<span style="font-size:2rem; color:var(--primary)">${rate}%</span>`;
        
        const action = document.getElementById('reportAction');
        if (wrongThisRound.size > 0) {
            action.innerHTML = `<button class="btn-primary" onclick="retryErrors()">🔄 隨機練習這 ${wrongThisRound.size} 個錯字</button>`;
        } else {
            action.innerHTML = `<button class="btn-primary" style="background:var(--success)" onclick="location.reload()">🎉 全對了！重新開始</button>`;
        }
    }

    function retryErrors() {
        currentPool = shuffle([...wrongThisRound]); // 重練也要隨機順序
        wrongThisRound.clear();
        currentRound++;
        startRound();
    }

    document.getElementById('userInput').onkeydown = (e) => { if(e.key === 'Enter') processInput(); };
</script>
</body>
</html>
